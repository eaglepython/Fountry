services:
  - type: web
    name: quant-alpha-foundry-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://YOUR-APP.vercel.app
      - key: CACHE_TTL_HOURS
        value: "24"
